  <!-- Cache Buster + SW Recovery Script (Safe — prevents infinite loops) -->
  <script>
    (function() {
      // === PART 1: Infinite Loop Protection ===
      var RELOAD_KEY = '__mastaba_reload_guard';
      var reloadCount = parseInt(sessionStorage.getItem(RELOAD_KEY) || '0', 10);
      if (reloadCount > 2) {
        console.warn('[Recovery] Reload loop detected (' + reloadCount + ' reloads). Stopping.');
        sessionStorage.removeItem(RELOAD_KEY);
        return; // Stop — don't reload anymore
      }

      // === PART 2: Service Worker Stale Cache Recovery ===
      // If JS bundles fail to load (SW served old HTML pointing to deleted JS files),
      // nuke the SW + caches and reload ONCE.
      window.addEventListener('error', function(e) {
        if (e.filename && (e.filename.includes('/assets/') || e.message && e.message.includes('Failed to fetch dynamically imported module'))) {
          console.error('[Recovery] JS bundle load failure detected. Clearing SW cache...');
          sessionStorage.setItem(RELOAD_KEY, String(reloadCount + 1));
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(names) {
              Promise.all(names.map(function(n) { return caches.delete(n); })).then(function() {
                window.location.reload();
              });
            });
          } else {
            window.location.reload();
          }
        }
      }, true);

      // Also catch dynamic import failures (lazy-loaded React components)
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && (
          e.reason.message.includes('Failed to fetch dynamically imported module') ||
          e.reason.message.includes('Importing a module script failed') ||
          e.reason.message.includes('error loading dynamically imported module')
        )) {
          console.error('[Recovery] Dynamic import failure. Clearing SW cache...');
          sessionStorage.setItem(RELOAD_KEY, String(reloadCount + 1));
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(names) {
              Promise.all(names.map(function(n) { return caches.delete(n); })).then(function() {
                window.location.reload();
              });
            });
          } else {
            window.location.reload();
          }
        }
      });

      // === PART 3: Safe Version Check (non-blocking, no loop risk) ===
      (async function checkAppVersion() {
        try {
          var timestamp = new Date().getTime();
          var response = await fetch('/version.json?t=' + timestamp, { cache: 'no-store' });
          if (!response.ok) return; // File missing? Just skip — don't reload.
          
          var data = await response.json();
          var latestVersion = data.version;
          var currentVersion = localStorage.getItem('appVersion');

          if (currentVersion && currentVersion !== latestVersion) {
            console.log('[Update] New version detected:', latestVersion);
            localStorage.setItem('appVersion', latestVersion);
            sessionStorage.setItem(RELOAD_KEY, String(reloadCount + 1));
            
            if ('caches' in window) {
              var cacheNames = await caches.keys();
              await Promise.all(cacheNames.map(function(name) { return caches.delete(name); }));
            }
            window.location.reload();
          } else if (!currentVersion) {
            // First visit — just store version, don't reload
            localStorage.setItem('appVersion', latestVersion);
          }
        } catch (error) {
          // Silently ignore — version.json may not exist yet
        }
      })();

      // Reset reload guard after successful page load
      window.addEventListener('load', function() {
        setTimeout(function() { sessionStorage.removeItem(RELOAD_KEY); }, 3000);
      });
    })();
  </script>
