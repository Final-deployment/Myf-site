name: Emergency Restore Site

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
    - name: Full Server Restoration
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        command_timeout: 5m
        script: |
          set -x
          echo "=== STEP 1: Check running containers ==="
          docker ps -a

          echo "=== STEP 2: Start the correct container ==="
          docker start mastaba-v4-container || docker start mastaba-v3-container || echo "No known container found"

          echo "=== STEP 3: Open firewall ports ==="
          ufw allow 80/tcp || true
          ufw allow 443/tcp || true
          ufw allow 'Nginx Full' || true
          ufw status

          echo "=== STEP 4: Install Certbot if missing ==="
          apt-get update -y
          apt-get install -y certbot python3-certbot-nginx

          echo "=== STEP 5: Write correct Nginx config ==="
          ACTIVE_PORT=$(docker port mastaba-v4-container 5000 2>/dev/null | head -1 | cut -d: -f2 || echo "")
          if [ -z "$ACTIVE_PORT" ]; then
            ACTIVE_PORT=$(docker port mastaba-v3-container 5000 2>/dev/null | head -1 | cut -d: -f2 || echo "3001")
          fi
          echo "Detected active port: $ACTIVE_PORT"

          cat > /etc/nginx/sites-available/scientific-bench <<NGINXEOF
          server {
              listen 80;
              listen [::]:80;
              server_name muslimyouth.ps www.muslimyouth.ps;

              location / {
                  proxy_pass http://localhost:${ACTIVE_PORT};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host \$host;
                  proxy_cache_bypass \$http_upgrade;
              }

              location /api {
                  proxy_pass http://localhost:${ACTIVE_PORT}/api;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host \$host;
                  proxy_cache_bypass \$http_upgrade;
              }
          }
          NGINXEOF

          ln -sf /etc/nginx/sites-available/scientific-bench /etc/nginx/sites-enabled/
          rm -f /etc/nginx/sites-enabled/default

          echo "=== STEP 6: Test and reload Nginx ==="
          nginx -t
          systemctl reload nginx

          echo "=== STEP 7: Run Certbot for SSL ==="
          certbot --nginx -d muslimyouth.ps -d www.muslimyouth.ps --non-interactive --agree-tos -m mohammadaydi93@gmail.com --redirect --force-renewal || echo "Certbot encountered an issue"

          echo "=== STEP 8: Final reload and status ==="
          systemctl reload nginx
          cat /etc/nginx/sites-available/scientific-bench
          echo "=== DONE ==="
          docker ps
